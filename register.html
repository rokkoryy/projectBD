<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>AutoDrive - Регистрация</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", Arial, sans-serif;
        background: #0f0e17;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        max-width: 450px;
        width: 100%;
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 40px 80px rgba(0, 0, 0, 0.3);
      }
      .container h2 {
        text-align: center;
        font-size: 28px;
        color: #0f0e17;
        margin-bottom: 6px;
      }
      .container .subtitle {
        text-align: center;
        color: #6b6b6b;
        font-size: 14px;
        margin-bottom: 24px;
      }
      .container label {
        display: block;
        font-weight: 600;
        font-size: 13px;
        color: #333;
        margin-top: 14px;
        margin-bottom: 4px;
      }
      .container label:first-of-type {
        margin-top: 0;
      }
      .container input {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #e8e8e8;
        border-radius: 12px;
        font-size: 14px;
        transition: 0.3s;
        background: #fafafa;
      }
      .container input:focus {
        border-color: #ff8906;
        outline: none;
        background: white;
        box-shadow: 0 0 0 4px rgba(255, 137, 6, 0.08);
      }
      .container button {
        width: 100%;
        padding: 14px;
        background: #ff8906;
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 20px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .container button:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 30px rgba(255, 137, 6, 0.3);
      }
      .container .link {
        text-align: center;
        margin-top: 16px;
        color: #6b6b6b;
        font-size: 14px;
      }
      .container .link a {
        color: #ff8906;
        text-decoration: none;
        font-weight: 600;
      }
      .container .link a:hover {
        text-decoration: underline;
      }
      .error {
        color: #e74c3c;
        font-size: 13px;
        text-align: center;
        margin-top: 10px;
        display: none;
      }
    </style>
  </head>
  <body>
    <form class="container" id="registerForm">
      <h2>Регистрация</h2>

      <label>Логин</label>
      <input
        type="text"
        id="login"
        placeholder="Логин (мин 6, латиница+цифры)"
        required
      />

      <label>Пароль</label>
      <input
        type="password"
        id="password"
        placeholder="Пароль (мин 8)"
        required
      />

      <label>Имя</label>
      <input type="text" id="name" placeholder="Имя" required />

      <label>Фамилия</label>
      <input type="text" id="lastName" placeholder="Фамилия" required />

      <label>Отчество</label>
      <input
        type="text"
        id="middleName"
        placeholder="Отчество (необязательно)"
      />

      <label>Почта</label>
      <input type="email" id="email" placeholder="Email" required />

      <label>Номер телефона</label>
      <input type="text" id="phone" placeholder="Телефон" required />

      <button type="submit">Зарегистрироваться</button>
      <div id="error" class="error"></div>
      <div class="link">Уже есть аккаунт? <a href="login.html">Войти</a></div>
    </form>

    <script>
      document.getElementById("registerForm").onsubmit = async (e) => {
        e.preventDefault();

        document.getElementById("error").style.display = "none";

        const login = document.getElementById("login").value.trim();
        const password = document.getElementById("password").value.trim();
        const name = document.getElementById("name").value.trim();
        const lastName = document.getElementById("lastName").value.trim();
        const middleName =
          document.getElementById("middleName").value.trim() || null;
        const email = document.getElementById("email").value.trim();
        const phone = document.getElementById("phone").value.trim();

        if (!login || !password || !name || !lastName || !email || !phone) {
          const errorDiv = document.getElementById("error");
          errorDiv.textContent = "Все поля обязательны для заполнения";
          errorDiv.style.display = "block";
          return;
        }

        const data = {
          login: login,
          password: password,
          name: name,
          lastName: lastName,
          middleName: middleName,
          email: email,
          phone: phone,
        };

        try {
          const registerRes = await fetch(
            "http://localhost:3000/api/auth/register",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(data),
            }
          );

          const registerResult = await registerRes.json();

          if (!registerRes.ok) {
            const errorDiv = document.getElementById("error");
            errorDiv.textContent = registerResult.error;
            errorDiv.style.display = "block";
            return;
          }

          const loginRes = await fetch("http://localhost:3000/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              login: data.login,
              password: data.password,
            }),
          });

          const loginResult = await loginRes.json();

          if (loginRes.ok) {
            localStorage.setItem("userId", loginResult.userId);
            localStorage.setItem("roleId", loginResult.roleId);

            window.location.href = "main.html";
          } else {
            window.location.href = "login.html";
          }
        } catch (error) {
          const errorDiv = document.getElementById("error");
          errorDiv.textContent = "Ошибка подключения к серверу";
          errorDiv.style.display = "block";
        }
      };
    </script>
  </body>
</html>
