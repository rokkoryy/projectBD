<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>AutoDrive - Новая заявка</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", Arial, sans-serif;
        background: #0f0e17;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        max-width: 450px;
        width: 100%;
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 40px 80px rgba(0, 0, 0, 0.3);
      }
      .container h2 {
        text-align: center;
        font-size: 26px;
        color: #0f0e17;
        margin-bottom: 4px;
      }
      .container .subtitle {
        text-align: center;
        color: #6b6b6b;
        font-size: 14px;
        margin-bottom: 24px;
      }
      .container label {
        display: block;
        font-weight: 600;
        font-size: 13px;
        color: #333;
        margin-bottom: 4px;
      }
      .container select,
      .container input {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #e8e8e8;
        border-radius: 12px;
        font-size: 14px;
        transition: 0.3s;
        background: #fafafa;
        font-family: inherit;
      }
      .container select:focus,
      .container input:focus {
        border-color: #ff8906;
        outline: none;
        background: white;
        box-shadow: 0 0 0 4px rgba(255, 137, 6, 0.08);
      }
      .container .form-group {
        margin-bottom: 16px;
      }
      .container button {
        width: 100%;
        padding: 14px;
        background: #ff8906;
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 8px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .container button:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 30px rgba(255, 137, 6, 0.3);
      }
      .container .back-link {
        display: block;
        text-align: center;
        margin-top: 14px;
        color: #6b6b6b;
        text-decoration: none;
        font-size: 14px;
      }
      .container .back-link:hover {
        color: #ff8906;
      }
      .error {
        color: #e74c3c;
        font-size: 13px;
        text-align: center;
        margin-top: 8px;
        display: none;
        padding: 8px;
        background: #fde8e8;
        border-radius: 8px;
      }
      .success {
        background: #e8f8f0;
        color: #00b894;
        padding: 10px;
        border-radius: 8px;
        text-align: center;
        display: none;
        font-size: 14px;
        margin-bottom: 12px;
        border: 1px solid #00b894;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Новая заявка</h2>
      <p class="subtitle">Заполните форму для записи на курсы</p>

      <div class="success" id="successMessage">Заявка отправлена</div>

      <form id="requestForm">
        <div class="form-group">
          <label>Вид транспорта</label>
          <select id="transportId" required>
            <option value="">Выберите...</option>
          </select>
        </div>

        <div class="form-group">
          <label>Дата начала</label>
          <input type="date" id="startDate" required />
        </div>

        <div class="form-group">
          <label>Способ оплаты</label>
          <select id="paymentMethod" required>
            <option value="">Выберите...</option>
            <option value="Наличные">Наличные</option>
            <option value="Карта">Карта</option>
            <option value="Безналичный расчет">Безналичный расчет</option>
          </select>
        </div>

        <div class="error" id="errorMessage"></div>

        <button type="submit">Отправить</button>
      </form>

      <a href="main.html" class="back-link">← Вернуться</a>
    </div>

    <script>
      const API_URL = "http://localhost:3000/api";
      const userId = localStorage.getItem("userId");

      if (!userId) {
        window.location.href = "login.html";
      }
      async function loadTransports() {
        try {
          const res = await fetch(`${API_URL}/requests/transports`);
          const transports = await res.json();
          const select = document.getElementById("transportId");
          transports.forEach((t) => {
            const option = document.createElement("option");
            option.value = t.id;
            option.textContent = t.type;
            select.appendChild(option);
          });
        } catch (error) {
          document.getElementById("errorMessage").textContent =
            "Ошибка загрузки";
          document.getElementById("errorMessage").style.display = "block";
        }
      }

      document.getElementById("requestForm").onsubmit = async (e) => {
        e.preventDefault();
        document.getElementById("errorMessage").style.display = "none";
        document.getElementById("successMessage").style.display = "none";

        const data = {
          userId: parseInt(userId),
          transportId: parseInt(document.getElementById("transportId").value),
          startDate: document.getElementById("startDate").value,
          paymentMethod: document.getElementById("paymentMethod").value,
        };

        if (!data.transportId || !data.startDate || !data.paymentMethod) {
          document.getElementById("errorMessage").textContent =
            "Заполните все поля";
          document.getElementById("errorMessage").style.display = "block";
          return;
        }

        try {
          const res = await fetch(`${API_URL}/requests`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          });

          if (res.ok) {
            document.getElementById("successMessage").style.display = "block";
            setTimeout(() => (window.location.href = "main.html"), 1200);
          } else {
            const err = await res.json();
            document.getElementById("errorMessage").textContent =
              err.error || "Ошибка";
            document.getElementById("errorMessage").style.display = "block";
          }
        } catch (error) {
          document.getElementById("errorMessage").textContent =
            "Ошибка подключения";
          document.getElementById("errorMessage").style.display = "block";
        }
      };

      document.getElementById("startDate").min = new Date()
        .toISOString()
        .split("T")[0];
      loadTransports();
    </script>
  </body>
</html>
