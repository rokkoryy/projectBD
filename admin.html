<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>AutoDrive - Админ-панель</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", Arial, sans-serif;
        background: #f8f9fa;
        min-height: 100vh;
      }

      .header {
        background: #0f0e17;
        color: white;
        padding: 16px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        border-bottom: 3px solid #ff8906;
      }
      .header h1 {
        font-size: 22px;
      }
      .header h1 span {
        color: #ff8906;
      }
      .header-actions {
        display: flex;
        gap: 10px;
      }

      .btn {
        padding: 8px 20px;
        border: none;
        border-radius: 50px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
        transition: 0.3s;
      }
      .btn-primary {
        background: #ff8906;
        color: white;
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(255, 137, 6, 0.3);
      }
      .btn-danger {
        background: #e74c3c;
        color: white;
      }
      .btn-danger:hover {
        transform: translateY(-2px);
      }
      .btn-outline {
        background: transparent;
        color: white;
        border: 2px solid rgba(255, 255, 255, 0.2);
      }
      .btn-outline:hover {
        border-color: #ff8906;
        color: #ff8906;
      }

      .container {
        max-width: 1200px;
        margin: 24px auto;
        padding: 0 20px;
      }
      .card {
        background: white;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      }
      h2 {
        color: #0f0e17;
        font-size: 20px;
      }

      .filters {
        display: flex;
        gap: 12px;
        margin: 16px 0 20px;
        flex-wrap: wrap;
      }
      .filters select {
        padding: 10px 16px;
        border: 2px solid #e8e8e8;
        border-radius: 10px;
        font-size: 14px;
        background: white;
      }
      .filters select:focus {
        border-color: #ff8906;
        outline: none;
      }
      .filters button {
        padding: 10px 20px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 600;
      }
      .filters .apply {
        background: #ff8906;
        color: white;
      }
      .filters .reset {
        background: #e8e8e8;
        color: #333;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 16px;
      }
      th {
        background: #0f0e17;
        color: white;
        padding: 12px 16px;
        text-align: left;
        font-size: 13px;
      }
      td {
        padding: 12px 16px;
        border-bottom: 1px solid #eee;
      }
      tr:hover td {
        background: #f8f9fa;
      }

      .status {
        display: inline-block;
        padding: 4px 14px;
        border-radius: 50px;
        font-size: 12px;
        font-weight: 600;
      }
      .status-new {
        background: #fef9e7;
        color: #f39c12;
        border: 1px solid #f39c12;
      }
      .status-learning {
        background: #e3f0fa;
        color: #2980b9;
        border: 1px solid #2980b9;
      }
      .status-completed {
        background: #e8f8f0;
        color: #00b894;
        border: 1px solid #00b894;
      }

      .pagination {
        display: flex;
        gap: 8px;
        justify-content: center;
        margin-top: 24px;
      }
      .pagination button {
        padding: 8px 16px;
        border: 2px solid #e8e8e8;
        border-radius: 10px;
        background: white;
        cursor: pointer;
        font-weight: 600;
        transition: 0.3s;
      }
      .pagination button:hover {
        background: #ff8906;
        color: white;
        border-color: #ff8906;
      }

      .logout-btn {
        float: right;
        background: #e74c3c;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 50px;
        cursor: pointer;
      }
      .error {
        color: #e74c3c;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div id="loginForm" class="login-box">
      <h2>Вход для админа</h2>
      <input type="text" id="login" placeholder="Логин" value="Admin26" />
      <input
        type="password"
        id="password"
        placeholder="Пароль"
        value="Demo20"
      />
      <button onclick="adminLogin()">Войти</button>
      <div id="loginError" class="error"></div>
      <p style="margin-top: 15px">
        <a href="#" onclick="alert('Страница входа для пользователей')"
          >← Обычный вход</a
        >
      </p>
    </div>

    <div id="adminPanel" style="display: none">
      <div class="container">
        <div class="clearfix">
          <button class="logout-btn" onclick="logout()">Выйти</button>
          <h1>Панель админа</h1>
        </div>
        <h2>Управление заявками на обучение</h2>

        <div class="filters">
          <select id="statusFilter">
            <option value="все">Все статусы</option>
            <option value="Новая">Новая</option>
            <option value="Идет обучение">Идет обучение</option>
            <option value="Обучение завершено">Обучение завершено</option>
          </select>
          <button onclick="loadRequests()">Применить</button>
          <button onclick="resetFilters()">Сбросить</button>
        </div>

        <div id="requestsList">Загрузка...</div>
        <div id="pagination" class="pagination"></div>
      </div>
    </div>

    <script>
      let currentPage = 1;

      async function adminLogin() {
        const login = document.getElementById("login").value;
        const password = document.getElementById("password").value;

        try {
          const response = await fetch(
            "http://localhost:3000/api/admin/login",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ login, password }),
            }
          );

          const result = await response.json();

          if (response.ok) {
            document.getElementById("loginForm").style.display = "none";
            document.getElementById("adminPanel").style.display = "block";
            loadRequests();
          } else {
            document.getElementById("loginError").innerText = result.error;
          }
        } catch (error) {
          document.getElementById("loginError").innerText =
            "Ошибка подключения";
        }
      }

      async function loadRequests() {
        const status = document.getElementById("statusFilter").value;
        const url = `http://localhost:3000/api/admin/requests?status=${status}&page=${currentPage}&limit=10`;

        try {
          const response = await fetch(url);
          const data = await response.json();
          displayRequests(data.requests || []);
          displayPagination(data);
        } catch (error) {
          document.getElementById("requestsList").innerHTML =
            "<p>Ошибка загрузки</p>";
        }
      }

      function displayRequests(requests) {
        if (requests.length === 0) {
          document.getElementById("requestsList").innerHTML =
            "<p>Нет заявок</p>";
          return;
        }

        let html = `
        <table>
            <tr>
                <th>ID</th>
                <th>Пользователь</th>
                <th>Транспорт</th>
                <th>Дата</th>
                <th>Оплата</th>
                <th>Статус</th>
                <th>Действие</th>
            </tr>
    `;

        requests.forEach((req) => {
          let statusClass = "";
          if (req.status === "Новая") statusClass = "status-new";
          else if (req.status === "Идет обучение")
            statusClass = "status-learning";
          else statusClass = "status-completed";

          html += `
            <tr>
                <td>${req.id}</td>
                <td>${req.surname || ""} ${req.name || ""}</td>
                <td>${req.type_transport || ""}</td>
                <td>${
                  req.start_date
                    ? new Date(req.start_date).toLocaleDateString()
                    : "—"
                }</td>
                <td>${req.payment_type || ""}</td>
                <td><span class="${statusClass}">${req.status || ""}</span></td>
                <td>
                    <select onchange="changeStatus(${req.id}, this.value)">
                        <option value="Новая" ${
                          req.status === "Новая" ? "selected" : ""
                        }>Новая</option>
                        <option value="Идет обучение" ${
                          req.status === "Идет обучение" ? "selected" : ""
                        }>Идет обучение</option>
                        <option value="Обучение завершено" ${
                          req.status === "Обучение завершено" ? "selected" : ""
                        }>Обучение завершено</option>
                    </select>
                </td>
            </tr>
        `;
        });

        html += `</table>`;
        document.getElementById("requestsList").innerHTML = html;
      }

      async function changeStatus(requestId, newStatus) {
        try {
          const response = await fetch(
            `http://localhost:3000/api/admin/requests/${requestId}/status`,
            {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ status: newStatus }),
            }
          );

          if (response.ok) {
            alert("Статус изменён!");
            loadRequests();
          } else {
            const error = await response.json();
            alert("Ошибка: " + error.error);
          }
        } catch (error) {
          alert("Ошибка подключения");
        }
      }
      function displayPagination(data) {
        if (!data || data.totalPages <= 1) {
          document.getElementById("pagination").innerHTML = "";
          return;
        }

        let html = "";
        for (let i = 1; i <= data.totalPages; i++) {
          html += `<button onclick="goToPage(${i})" style="background: ${
            i === data.page ? "#2980b9" : "#ecf0f1"
          }; color: ${i === data.page ? "white" : "black"}">${i}</button>`;
        }
        document.getElementById("pagination").innerHTML = html;
      }

      function goToPage(page) {
        currentPage = page;
        loadRequests();
      }

      function resetFilters() {
        document.getElementById("statusFilter").value = "все";
        currentPage = 1;
        loadRequests();
      }

      function logout() {
        document.getElementById("loginForm").style.display = "block";
        document.getElementById("adminPanel").style.display = "none";
        currentPage = 1;
        document.getElementById("loginError").innerText = "";
      }
    </script>
  </body>
</html>
