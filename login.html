<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoDrive - Вход</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", Arial, sans-serif;
        background: #efeff3;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .login-box {
        max-width: 400px;
        width: 100%;
        background: white;
        padding: 48px 40px;
        border-radius: 20px;
        box-shadow: 0 40px 80px rgba(0, 0, 0, 0.3);
        text-align: center;
      }
      .login-box .logo {
        font-size: 56px;
        margin-bottom: 8px;
      }
      .login-box h2 {
        font-size: 28px;
        color: #0f0e17;
      }
      .login-box .subtitle {
        color: #6b6b6b;
        font-size: 14px;
        margin-bottom: 30px;
      }
      .login-box input {
        width: 100%;
        padding: 14px 18px;
        margin: 6px 0;
        border: 2px solid #e8e8e8;
        border-radius: 12px;
        font-size: 15px;
        transition: 0.3s;
      }
      .login-box input:focus {
        border-color: #ff8906;
        outline: none;
        box-shadow: 0 0 0 4px rgba(255, 137, 6, 0.08);
      }
      .login-box button {
        width: 100%;
        padding: 16px;
        background: #ff8906;
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 12px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .login-box button:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 30px rgba(255, 137, 6, 0.3);
      }
      .login-box .link {
        margin-top: 18px;
        color: #6b6b6b;
        font-size: 14px;
      }
      .login-box .link a {
        color: #ff8906;
        text-decoration: none;
        font-weight: 600;
      }
      .login-box .link a:hover {
        text-decoration: underline;
      }
      .error {
        color: #e74c3c;
        font-size: 14px;
        margin-top: 10px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Вход</h1>

      <form id="loginForm">
        <div class="form-group">
          <label>Логин</label>
          <input type="text" id="login" required />
        </div>

        <div class="form-group">
          <label>Пароль</label>
          <input type="password" id="password" required />
        </div>

        <div class="error" id="errorMessage"></div>

        <button type="submit">Войти</button>
      </form>

      <div class="link">
        Нет аккаунта?
        <a href="#" onclick="alert('Переход на страницу регистрации')"
          >Зарегистрироваться</a
        >
      </div>
    </div>

    <script>
      const API_URL = "http://localhost:3000/api";

      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const errorDiv = document.getElementById("errorMessage");
          errorDiv.style.display = "none";

          const login = document.getElementById("login").value.trim();
          const password = document.getElementById("password").value.trim();

          if (!login || !password) {
            errorDiv.textContent = "Введите логин и пароль";
            errorDiv.style.display = "block";
            return;
          }

          const data = { login, password };

          try {
            const response = await fetch(`${API_URL}/auth/login`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(data),
            });

            const result = await response.json();

            if (response.ok) {
              localStorage.setItem("userId", result.userId);
              localStorage.setItem("roleId", result.roleId);
              window.location.href = "main.html";
            } else {
              localStorage.removeItem("userId");
              localStorage.removeItem("roleId");
              errorDiv.textContent = result.error;
              errorDiv.style.display = "block";
            }
          } catch (error) {
            localStorage.removeItem("userId");
            localStorage.removeItem("roleId");
            errorDiv.textContent = "Ошибка подключения к серверу";
            errorDiv.style.display = "block";
          }
        });
    </script>
  </body>
</html>
